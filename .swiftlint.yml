# SwiftLint configuration for Onyx
# See https://github.com/realm/SwiftLint

included:
  - Sources/OnyxLib
  - Sources/OnyxApp
  - Sources/OnyxMCP
  - Tests

excluded:
  - .build

# Opt-in rules (not enabled by default)
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - trailing_comma
  - todo
  - line_length
  - identifier_name
  - type_name
  - nesting
  - force_cast
  - force_try            # acceptable in tests; few uses elsewhere are deliberate
  - function_parameter_count
  - cyclomatic_complexity
  - function_body_length

# `unused_import` runs only under `swiftlint analyze`, not `swiftlint lint`.
# Listed here so the lint pass doesn't emit a config warning.
analyzer_rules:
  - unused_import

# File-level thresholds
# NOTE: error threshold raised to 2000 because TerminalSessionManager.swift is
# currently 1519 lines and pending refactor. The 1500-line target is documented
# in docs/static-analysis.md and should be restored once that file is split.
file_length:
  warning: 1000
  error: 2000
  ignore_comment_only_lines: true

# Type-level thresholds (informational — these often warrant refactoring)
# NOTE: error threshold raised to 1500 because TerminalSessionManager and
# AppState currently have type bodies of ~1054 and ~971 lines respectively.
# Restore to 800 once those types are split. See docs/static-analysis.md.
type_body_length:
  warning: 500
  error: 1500

large_tuple:
  warning: 4
  error: 6
